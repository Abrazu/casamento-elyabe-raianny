<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Convidados</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-marsala-rgb: 142 59 70;
      --color-marsala2-rgb: 112 29 40;
      --color-rosa-rgb: 245 208 216;
      --color-rosa2-rgb: 232 195 203;
    }
    .bg-marsala { background-color: rgb(var(--color-marsala-rgb)); }
    .bg-marsala2 { background-color: rgb(var(--color-marsala2-rgb)); }
    .text-vinho { color: #4A1C24; }
    .bg-rosa2 { background-color: rgb(var(--color-rosa2-rgb)); }
    
    .btn-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#FFFDFB] min-h-screen flex items-center justify-center font-sans px-4">
  <div class="bg-white rounded-sm shadow-2xl p-8 w-full max-w-sm flex flex-col gap-5 border border-rosa2/30 text-center">
    <div class="w-14 h-14 mx-auto rounded-full bg-rosa2/40 flex items-center justify-center mb-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-vinho" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    
    <h2 class="text-xl font-serif text-vinho">Acesso Restrito</h2>
    <p class="text-xs text-vinho/60 mb-2">Digite a senha dos convidados para entrar no site do casamento.</p>
    
    <input id="pass-input" type="password" placeholder="Sua senha" 
           class="w-full border border-rosa2 px-4 py-3 text-sm text-center text-vinho placeholder:text-vinho/30 focus:outline-none focus:border-marsala rounded-sm bg-[#FFFDFB]"
           onkeydown="if(event.key==='Enter') testarSenha()" autofocus />
    
    <button id="btn-login" onclick="testarSenha()" 
            class="w-full py-3 mt-2 bg-marsala text-white text-xs uppercase tracking-widest rounded-sm hover:opacity-90 flex items-center justify-center transition-opacity">
      <span class="btn-spinner" id="spinner"></span>Entrar
    </button>
  </div>

  <script>
    const SUPABASE_URL = 'https://etmuifggjeshiuhccnvk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bXVpZmdnamVzaGl1aGNjbnZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTcyODEsImV4cCI6MjA5MTY5MzI4MX0.V4cPWLgFQ1Rb57rnAZDfKTsn5GGkRy00dGGU3WWLr4E';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function apiGet(tabela) {
      const { data, error } = await _supabase.from(tabela.toLowerCase()).select('*').order('id', { ascending: true });
      if (error) { console.error('Erro no GET:', error.message); return []; }
      return data;
    }

    async function testarSenha() {
      const btn = document.getElementById('btn-login');
      const spinner = document.getElementById('spinner');
      const input = document.getElementById('pass-input');
      const pw = input.value.trim();

      if (!pw) {
        input.style.borderColor = '#8E3B46';
        input.focus();
        setTimeout(() => input.style.borderColor = '', 1200);
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      btn.style.opacity = '0.7';

      try {
        const dados = await apiGet('configuracoes');
        let senhaCorreta = 'Casamento2026';
        if (dados && dados.length > 0) {
          senhaCorreta = dados[0].senha_convidados || senhaCorreta;
          // Salva pra pegar as cores do tema
          localStorage.setItem('configuracoes_site', JSON.stringify(dados[0]));
        }

        if (pw === senhaCorreta) {
          sessionStorage.setItem('logado', 'true');
          sessionStorage.setItem('logado_time', Date.now().toString());
          window.location.href = 'home.html';
        } else {
          input.value = '';
          input.placeholder = 'Senha Incorreta!';
          input.style.borderColor = '#8E3B46';
          input.focus();
          setTimeout(() => {
            input.placeholder = 'Sua senha';
            input.style.borderColor = '';
          }, 1500);
        }
      } catch (e) {
        console.error('Erro de validação:', e);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btn.style.opacity = '1';
      }
    }
    
    // Auto-login se a sessão de 24h ainda for válida
    document.addEventListener('DOMContentLoaded', () => {
      const l = sessionStorage.getItem('logado');
      const lt = sessionStorage.getItem('logado_time');
      if (l === 'true' && lt) {
        if (Date.now() - parseInt(lt) < 86400000) { // 24h
          window.location.href = 'home.html';
        }
      }
    });
  </script>
</body>
</html>
